apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-aks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-aks
  template:
    metadata:
      labels:
        app: landing-aks
    spec:
      initContainers:
        - name: init-landing
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat > /data/index.html <<'EOF'
              <!DOCTYPE html>
              <html lang="es">
              <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>CP2 DevOps - AKS</title>
                <style>
                  * { box-sizing: border-box; }
                  body {
                    margin: 0;
                    font-family: Arial, sans-serif;
                    background: radial-gradient(circle at top, #1e3a8a, #0f172a 60%);
                    color: #f8fafc;
                    min-height: 100vh;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    padding: 24px;
                  }
                  .card {
                    width: 100%;
                    max-width: 820px;
                    background: rgba(15, 23, 42, 0.88);
                    border: 1px solid rgba(255,255,255,0.08);
                    border-radius: 20px;
                    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
                    padding: 40px;
                    text-align: center;
                  }
                  .logo {
                    width: 160px;
                    max-width: 100%;
                    margin: 0 auto 20px;
                    display: block;
                    background: white;
                    padding: 12px;
                    border-radius: 12px;
                  }
                  .badge {
                    display: inline-block;
                    padding: 8px 14px;
                    border-radius: 999px;
                    background: #2563eb;
                    font-size: 14px;
                    font-weight: bold;
                    letter-spacing: .3px;
                    margin-bottom: 18px;
                  }
                  h1 {
                    margin: 0 0 12px;
                    font-size: 38px;
                    line-height: 1.15;
                  }
                  p {
                    color: #cbd5e1;
                    font-size: 18px;
                    line-height: 1.7;
                    margin: 10px 0;
                  }
                  .highlight {
                    color: #93c5fd;
                    font-weight: bold;
                  }
                  .stack {
                    display: flex;
                    flex-wrap: wrap;
                    justify-content: center;
                    gap: 10px;
                    margin: 28px 0 10px;
                  }
                  .stack span {
                    background: rgba(255,255,255,0.08);
                    border: 1px solid rgba(255,255,255,0.06);
                    padding: 10px 14px;
                    border-radius: 999px;
                    color: #e2e8f0;
                    font-size: 14px;
                  }
                  .footer {
                    margin-top: 28px;
                    font-size: 14px;
                    color: #94a3b8;
                  }
                </style>
              </head>
              <body>
                <div class="card">
                  <img
                    class="logo"
                    src="data:image/png;base64,"
                    alt="Logo UNIR"
                  >
                  <div class="badge">Azure Kubernetes Service</div>
                  <h1>Caso Práctico 2<br>Despliegue en AKS</h1>
                  <p>
                    Landing personalizada desplegada sobre <span class="highlight">Azure Kubernetes Service</span>
                    con <span class="highlight">almacenamiento persistente</span>.
                  </p>
                  <p>
                    Infraestructura creada con <span class="highlight">Terraform</span> y
                    automatización con <span class="highlight">Ansible</span>.
                  </p>

                  <div class="stack">
                    <span>Terraform</span>
                    <span>Ansible</span>
                    <span>Podman</span>
                    <span>AKS</span>
                    <span>Kubernetes</span>
                    <span>Azure</span>
                  </div>

                  <div class="footer">
                    Ramiro Rodríguez Henríquez · UNIR · DevOps & Cloud Computing
                  </div>
                </div>
              </body>
              </html>
              EOF
          volumeMounts:
            - name: web-data
              mountPath: /data

      containers:
        - name: nginx
          image: acrdevopscp258677.azurecr.io/aks-app:casopractico2
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-data
              mountPath: /usr/share/nginx/html

      volumes:
        - name: web-data
          persistentVolumeClaim:
            claimName: landing-pvc